# docker-compose.yml
# ------------------
# Menjalankan dua service:
# 1. aggregator : service utama (FastAPI + SQLite)
# 2. publisher  : script simulasi (berjalan sekali lalu selesai)
#
# Jaringan internal — tidak ada koneksi ke layanan eksternal publik
#
# CARA PAKAI:
#   docker-compose up --build
#   docker-compose up aggregator   (hanya aggregator)

version: "3.9"

services:

  aggregator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: uts-aggregator
    ports:
      - "8080:8080"
    volumes:
      # Volume untuk persistensi SQLite database
      # Data tetap ada meski container di-restart
      - aggregator_data:/app/data
    environment:
      - DEDUP_DB_PATH=/app/data/dedup.db
      - PORT=8080
    networks:
      - uts-network
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  publisher:
    build:
      context: .
      dockerfile: Dockerfile.publisher
    container_name: uts-publisher
    depends_on:
      aggregator:
        condition: service_healthy
    environment:
      - AGGREGATOR_URL=http://aggregator:8080
    networks:
      - uts-network
    restart: "no"

networks:
  uts-network:
    driver: bridge

volumes:
  aggregator_data:
    driver: local